name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for kubeport? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's your current workaround?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like. Include CLI examples, config snippets, or API sketches if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of kubeport does this relate to?
      options:
        - CLI
        - Configuration
        - Port Forwarding
        - Health Checks
        - Hooks
        - Client Library (pkg/proxy)
        - Documentation
        - CI/CD
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else — links, screenshots, related issues.
