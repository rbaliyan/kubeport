name: ClusterFuzzLite Batch

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 0 28 * *' # 28th of every month, 00:00 UTC

permissions: read-all

jobs:
  fuzz:
    name: Fuzz (Batch)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          language: go
          sanitizer: address

      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          mode: batch
          fuzz-seconds: 120
          output-sarif: true

      - name: Upload SARIF
        if: always() && steps.run.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: cifuzz-sarif/results.sarif
          checkout_path: ${{ github.workspace }}

  prune:
    name: Prune Corpus
    runs-on: ubuntu-latest
    needs: fuzz
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          language: go
          sanitizer: address

      - name: Prune corpus
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          mode: prune
          fuzz-seconds: 60
