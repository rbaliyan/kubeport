syntax = "proto3";
package kubeport.v1;
option go_package = "github.com/rbaliyan/kubeport/api/kubeport/v1;kubeportv1";

import "google/protobuf/timestamp.proto";

service DaemonService {
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Stop(StopRequest) returns (StopResponse);
  rpc AddService(AddServiceRequest) returns (AddServiceResponse);
  rpc RemoveService(RemoveServiceRequest) returns (RemoveServiceResponse);
  rpc Reload(ReloadRequest) returns (ReloadResponse);
  rpc Apply(ApplyRequest) returns (ApplyResponse);
  rpc Mappings(MappingsRequest) returns (MappingsResponse);
  rpc UpdateChaos(UpdateChaosRequest) returns (UpdateChaosResponse);
}

enum ForwardState {
  FORWARD_STATE_UNSPECIFIED = 0;
  FORWARD_STATE_STARTING = 1;
  FORWARD_STATE_RUNNING = 2;
  FORWARD_STATE_FAILED = 3;
  FORWARD_STATE_STOPPED = 4;
  FORWARD_STATE_WAITING = 5;  // lazy mode: local port bound, SPDY tunnel not yet open
}

message ServiceInfo {
  string name = 1;
  string service = 2;
  string pod = 3;
  int32 local_port = 4;
  int32 remote_port = 5;
  string namespace = 6;
  string parent_name = 7;  // non-empty for multi-port expanded forwards
  string port_name = 8;    // Kubernetes port name
}

message PortSpec {
  bool all = 1;
  repeated string port_names = 2;
  repeated string exclude_ports = 3;
  int32 local_port_offset = 4;
}

message ForwardStatusProto {
  ServiceInfo service = 1;
  ForwardState state = 2;
  string error = 3;
  int32 restarts = 4;
  google.protobuf.Timestamp last_start = 5;
  bool connected = 6;
  int32 actual_port = 7;
  google.protobuf.Timestamp next_retry = 8;
  int64 bytes_in = 9;   // Total bytes received from the remote side
  int64 bytes_out = 10;  // Total bytes sent to the remote side
  int64 effective_latency_ms = 11;  // Injected latency in milliseconds (0 = none)
  int64 effective_jitter_ms = 12;   // Jitter range in milliseconds (0 = none)
  int64 effective_bandwidth = 13;   // Bandwidth cap in bytes/sec (0 = none)
  bool chaos_enabled = 14;               // Whether chaos injection is active
  double chaos_error_rate = 15;           // Configured error rate (0.0-1.0)
  double chaos_spike_probability = 16;    // Latency spike probability (0.0-1.0)
  int64 chaos_spike_duration_ms = 17;     // Latency spike duration in ms
  int64 chaos_errors_injected = 18;       // Count of errors injected so far
  int64 chaos_spikes_injected = 19;       // Count of latency spikes injected so far
  int64 conn_bytes_in = 20;              // Bytes received since last reconnect
  int64 conn_bytes_out = 21;             // Bytes sent since last reconnect
  bool lazy = 22;                        // true when service is configured in lazy mode
  bool tunnel_open = 23;                 // lazy mode: true when the SPDY tunnel is currently open
}

message StatusRequest {}
message StatusResponse {
  string context = 1;
  string namespace = 2;
  repeated ForwardStatusProto forwards = 3;
  string version = 4;
}

message StopRequest {}
message StopResponse { bool success = 1; }

message AddServiceRequest {
  ServiceInfo service = 1;
  bool persist = 2;
  PortSpec ports = 3;  // if set, multi-port mode
}
message AddServiceResponse {
  bool success = 1;
  string error = 2;
  int32 actual_port = 3;            // legacy single-port
  repeated int32 actual_ports = 4;  // multi-port
}

message RemoveServiceRequest {
  string name = 1;
  bool persist = 2;
}
message RemoveServiceResponse {
  bool success = 1;
  string error = 2;
}

message ReloadRequest {}
message ReloadResponse {
  bool success = 1;
  string error = 2;
  int32 added = 3;
  int32 removed = 4;
}

message ApplyRequest {
  repeated ServiceInfo services = 1;
  bool merge = 2;  // reserved for future replace semantics; currently always additive
}
message ApplyResponse {
  bool success = 1;
  string error = 2;
  int32 added = 3;
  int32 skipped = 4;
  repeated string warnings = 5;
}

message AddressMapping {
  string internal_addr = 1;  // K8s internal address (e.g., "web-api.demo.svc.cluster.local:80")
  string local_addr = 2;     // Local address (e.g., "localhost:8080")
  string service_name = 3;   // kubeport service name
}

// ChaosPreset selects a named chaos profile. When set, preset params
// override any inline fields in UpdateChaosRequest.
enum ChaosPreset {
  CHAOS_PRESET_UNSPECIFIED = 0;
  CHAOS_PRESET_SLOW_NETWORK = 1;     // 200 ms spikes, 10% probability
  CHAOS_PRESET_UNSTABLE_CLUSTER = 2; // 5% errors, 5% spike prob, 2 s spikes
  CHAOS_PRESET_PACKET_LOSS = 3;      // 15% error rate
}

// UpdateChaosRequest mutates live chaos parameters for one or more services
// without requiring a config reload or reconnect.
message UpdateChaosRequest {
  repeated string services = 1;  // service names to update; empty = all forwards
  ChaosPreset preset = 2;        // named preset (takes precedence when non-zero)
  // Inline params — used when preset = UNSPECIFIED.
  bool enabled = 3;
  double error_rate = 4;
  double spike_probability = 5;
  int64 spike_duration_ms = 6;
  bool reset = 7;  // true = revert to config-defined chaos for named services
}

message UpdateChaosResponse {
  repeated string updated = 1;    // names of services successfully updated
  repeated string not_found = 2;  // names that were not recognised
}

message MappingsRequest {
  string cluster_domain = 1;  // Custom cluster domain (default: "cluster.local")
}
message MappingsResponse {
  map<string, string> addrs = 1;            // Flat map: internal addr -> local addr
  repeated AddressMapping mappings = 2;     // Structured mappings with metadata
  string context = 3;
  string namespace = 4;
}
