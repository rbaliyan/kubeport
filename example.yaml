# kubeport configuration
#
# Place as kubeport.yaml in your project root, ~/.config/kubeport/, or ~/.kubeport/
#
# Usage:
#   kubeport start            # Start in background
#   kubeport status           # Check port connectivity
#   kubeport logs             # Follow logs
#   kubeport stop             # Stop proxy
#   kubeport config show      # View configuration
#
# Environment overrides:
#   K8S_CONTEXT   - Override the context below
#   K8S_NAMESPACE - Override the namespace below

# Inherit from a parent config (optional).
# Supports relative paths (resolved from this file's directory) and ~/...
# Child values override parent values; services and hooks are merged by name.
# Example: share api_key, listen, and supervisor settings across projects.
#
# extends: ~/.config/kubeport/global.yaml

# Kubernetes context from ~/.kube/config
context: my-cluster-context

# Default namespace (can be overridden per-service)
namespace: default

# Custom log file path (default: ~/.config/kubeport/logs/<instance-id>.log)
# log_file: /var/log/kubeport.log

# Daemon listen address (default: ~/.config/kubeport/<instance-id>.sock)
# Use sock:// prefix for a custom Unix socket path
# listen: sock:///tmp/kubeport.sock

# Network simulation (global defaults — applied to all services)
# Useful for testing resilience, timeout handling, and degraded network conditions.
# network:
#   latency: 50ms       # Injected delay on writes (simulates network latency)
#   jitter: 10ms        # Random variation on latency (+/- this value)
#   bandwidth: 5mbps    # Bandwidth cap (supports: kbps, mbps, gbps, kbytes, mbytes, gbytes)

# Chaos engineering (global defaults — applied to all services)
# Injects random faults for resilience testing.
# chaos:
#   enabled: true
#   error_rate: 0.02         # 2% of writes fail with a connection error
#   latency_spike:
#     probability: 0.01      # 1% chance of a latency spike per write
#     duration: 5s           # Duration of each spike

# Services to port-forward
services:
  # Forward a Kubernetes service (auto-resolves to a running pod)
  - name: My API
    service: my-api-service
    local_port: 8080
    remote_port: 80

  # Forward a specific pod
  - name: Redis Node 0
    pod: redis-node-0
    local_port: 6379
    remote_port: 6379

  # Override namespace for a specific service
  - name: Vault
    service: vault
    local_port: 8200
    remote_port: 8200
    namespace: vault

  # Dynamic port — OS assigns a random available local port
  - name: Debug Server
    service: debug-svc
    local_port: 0
    remote_port: 9090

  # Multi-port: forward all ports from a service (local_port = remote_port)
  # - name: Platform
  #   service: platform-svc
  #   ports: all

  # Multi-port: forward specific named ports
  # - name: Backend
  #   service: backend-svc
  #   ports:
  #     - http
  #     - grpc

  # Multi-port: named ports with local port overrides
  # - name: Backend
  #   service: backend-svc
  #   ports:
  #     - name: http
  #       local_port: 8080
  #     - name: grpc

  # Per-service network simulation (overrides global defaults)
  # - name: Slow Backend
  #   service: backend-svc
  #   local_port: 9090
  #   remote_port: 80
  #   network:
  #     latency: 150ms
  #     jitter: 20ms
  #     bandwidth: 1mbps

  # Per-service chaos (overrides global chaos settings)
  # - name: Fragile Backend
  #   service: backend-svc
  #   local_port: 9090
  #   remote_port: 80
  #   chaos:
  #     enabled: true
  #     error_rate: 0.1
  #     latency_spike:
  #       probability: 0.05
  #       duration: 3s

  # Multi-port: all ports except metrics, with offset
  # - name: Platform
  #   service: platform-svc
  #   ports: all
  #   exclude_ports: [metrics]
  #   local_port_offset: 10000

# Supervisor tuning (all optional, sensible defaults)
# supervisor:
#   max_restarts: 10
#   health_check_interval: 10s
#   health_check_threshold: 3
#   ready_timeout: 15s
#   backoff_initial: 1s
#   backoff_max: 30s
#   max_connection_age: 30m

# Lifecycle hooks — run actions on port-forward events
# hooks:
#   - name: notify
#     type: shell
#     shell:
#       forward:connected: notify-send "kubeport" "${KUBEPORT_SERVICE} ready on port ${KUBEPORT_LOCAL_PORT}"
#       forward:failed: notify-send -u critical "kubeport" "${KUBEPORT_SERVICE} failed"

# SOCKS5 proxy for Kubernetes DNS translation
# When enabled: true, starts automatically with the daemon (kubeport start/fg).
# When enabled: false (default), use "kubeport socks" to start manually.
# The --listen flag overrides the listen address in both modes.
# socks:
#   enabled: true
#   listen: 127.0.0.1:1080
#   # username: admin
#   # password: secret

# HTTP/HTTPS proxy for Kubernetes DNS translation
# When enabled: true, starts automatically with the daemon (kubeport start/fg).
# When enabled: false (default), use "kubeport http-proxy" to start manually.
# The --listen flag overrides the listen address in both modes.
# http_proxy:
#   enabled: true
#   listen: 127.0.0.1:3128
#   # username: admin
#   # password: secret

# Remote daemon control (TCP listener)
# listen: tcp://0.0.0.0:9400
# api_key: my-secret-api-key
