version: 2

project_name: kubeport

before:
  hooks:
    - go mod tidy

builds:
  - id: kubeport
    main: .
    binary: kubeport
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/rbaliyan/go-version.VersionInfo={{.Version}}
      - -X github.com/rbaliyan/go-version.GitCommit={{.FullCommit}}
      - -X github.com/rbaliyan/go-version.GitBranch={{.Branch}}
      - -X github.com/rbaliyan/go-version.BuildTimestamp={{.Date}}
      - -X github.com/rbaliyan/kubeport/internal/cli.InstallMethod=github
    flags:
      - -trimpath

# Compress binaries with UPX (significant size reduction)
upx:
  - enabled: true
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    compress: best
    lzma: true

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*
      - example.yaml
      - example.toml

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: all

dockers:
  - id: kubeport-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/rbaliyan/kubeport:{{ .Version }}-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=GIT_COMMIT={{ .FullCommit }}"
      - "--build-arg=BUILD_TIMESTAMP={{ .Date }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/rbaliyan/kubeport"
      - "--label=org.opencontainers.image.licenses=MIT"

  - id: kubeport-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/rbaliyan/kubeport:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=GIT_COMMIT={{ .FullCommit }}"
      - "--build-arg=BUILD_TIMESTAMP={{ .Date }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/rbaliyan/kubeport"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/rbaliyan/kubeport:{{ .Version }}"
    image_templates:
      - "ghcr.io/rbaliyan/kubeport:{{ .Version }}-amd64"
      - "ghcr.io/rbaliyan/kubeport:{{ .Version }}-arm64"

  - name_template: "ghcr.io/rbaliyan/kubeport:latest"
    image_templates:
      - "ghcr.io/rbaliyan/kubeport:{{ .Version }}-amd64"
      - "ghcr.io/rbaliyan/kubeport:{{ .Version }}-arm64"
    skip_push: "auto"

docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - sign
      - "${artifact}"
      - "--yes"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

nfpms:
  - id: packages
    package_name: kubeport
    vendor: Rajeev Baliyan
    homepage: https://github.com/rbaliyan/kubeport
    maintainer: Rajeev Baliyan
    description: Kubernetes port-forward supervisor with health checks and auto-restart
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: ./completions/kubeport.bash
        dst: /usr/share/bash-completion/completions/kubeport
      - src: ./completions/kubeport.zsh
        dst: /usr/share/zsh/vendor-completions/_kubeport
      - src: ./completions/kubeport.fish
        dst: /usr/share/fish/vendor_completions.d/kubeport.fish

brews:
  - repository:
      owner: rbaliyan
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/rbaliyan/kubeport
    description: Kubernetes port-forward supervisor with health checks and auto-restart
    license: MIT
    test: |
      system "#{bin}/kubeport", "version"

release:
  github:
    owner: rbaliyan
    name: kubeport
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
